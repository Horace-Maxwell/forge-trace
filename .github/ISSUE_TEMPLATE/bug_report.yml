name: Bug report
description: Report broken tracing, collector issues, or confusing output
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did you hit this?
      options:
        - GitHub Action
        - CLI
        - Cloudflare collector
        - Share page
        - README or examples
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow or command
      description: Share the command or job flow you wrapped.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, trace output, or screenshots
